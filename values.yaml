# Default values for ..
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: lakhansamani/authorizer
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534 # nobody user

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Add any extra environment variables here.
# These are set on the pod and expanded in the CLI args via shell.
# https://docs.authorizer.dev/core/env
extraEnv:
  []
  # - name: "CUSTOM_ACCESS_TOKEN_SCRIPT"
  #   value: "my-script"

# Redis server configuration
# If not specified standard storage class will be used with 5gi size
redis:
  # Install redis
  # (if set to true will install redis)
  install: null
  storageClassName: null
  storage: null

authorizer:
  # Redis URL where sessions can be persisted
  # If not set and if install is not set to true
  # it will persist session in-memory
  redis_url: null

  # Which database you are using. Supported database
  # types are postgres, mysql, planetscale, sqlite, sqlserver,
  # mongodb, arangodb, yugabyte, mariadb, cassandradb, scylladb, dynamodb, couchbase
  database_type: null

  # Database connection string. In case of cluster url eg. for
  # cassandra db, you can use comma separated IPs.
  database_url: null

  # Database name
  database_name: null

  # Database host name
  database_host: null

  # Database port
  database_port: null

  # Database username
  database_username: null

  # Database password
  database_password: null

  # Database certificate in base 64 encoded form
  database_cert: null

  # Database certificate key in base 64 encoded form
  database_cert_key: null

  # Database CA certificate in base 64 encoded form
  database_ca_cert: null

  # AWS region. In case of dynamodb database_type
  aws_region: null

  # AWS access key identifier. In case of dynamodb database_type
  aws_access_key_id: null

  # AWS secret access key. In case of dynamodb database_type
  aws_secret_access_key: null

  # URL for authorizer deployment
  authorizer_url: null

  # Couchbase bucket. In case of couchbase database_type
  couchbase_bucket: null

  # Couchbase bucket ram quota. In case of couchbase database_type
  couchbase_bucket_ram_quota: null

  # Couchbase scope. In case of couchbase database_type
  couchbase_scope: null

  # OAuth client ID (required)
  client_id: null

  # OAuth client secret (required)
  client_secret: null

  # Admin secret (--admin-secret).
  # REQUIRED, non-empty. As of the April 2026 security release the
  # authorizer binary refuses to start when --admin-secret is empty —
  # the previous insecure "password" default has been removed. Pick any
  # non-empty value; the strength of the secret is your responsibility.
  admin_secret: null

  # JWT type (e.g. HS256, RS256)
  jwt_type: null

  # JWT secret (for HMAC-based JWT)
  jwt_secret: null

  # JWT private key (for RSA/EC-based JWT)
  jwt_private_key: null

  # JWT public key (for RSA/EC-based JWT)
  jwt_public_key: null

  # Twilio Account SID for SMS support
  twilio_account_sid: null

  # Twilio API Key for SMS support
  twilio_api_key: null

  # Twilio API Secret for SMS support
  twilio_api_secret: null

  # Twilio Sender phone number for SMS support
  twilio_sender: null

  # SMTP host for email
  smtp_host: null

  # SMTP port for email
  smtp_port: null

  # SMTP username for email
  smtp_username: null

  # SMTP password for email
  smtp_password: null

  # SMTP sender email
  smtp_sender_email: null

  # SMTP sender name
  smtp_sender_name: null

  # ----------------------------------------------------------------------
  # April 2026 security hardening flags
  # ----------------------------------------------------------------------

  # Trusted reverse-proxy networks (--trusted-proxies). Comma-separated CIDRs.
  # Empty (the default) means gin uses RemoteAddr and ignores X-Forwarded-For
  # — safe out of the box. If Authorizer is behind an ingress controller,
  # nginx, Cloudflare, etc., set this to the proxy network or per-IP rate
  # limiting and audit logs will key on the proxy IP. See
  # https://docs.authorizer.dev/core/security#trusted-proxies
  trusted_proxies: null

  # Refresh-token lifetime in seconds (--refresh-token-expires-in).
  # Default 30 days (2592000). Shorten for higher-security deployments;
  # lengthen for long-lived sessions.
  refresh_token_expires_in: null

  # Strict-Transport-Security response header (--enable-hsts).
  # Off by default — only enable behind TLS, otherwise browsers will be
  # locked out for a year (max-age=31536000).
  enable_hsts: false

  # Disable the default Content-Security-Policy header (--disable-csp).
  # CSP is on by default with a conservative policy. Set true ONLY as an
  # escape hatch if the default policy breaks a customised dashboard.
  disable_csp: false

  # GraphQL query limits (--graphql-max-*). Defaults are conservative;
  # raise individually if your legitimate operation surface needs them.
  # Rejections are emitted as the authorizer_graphql_limit_rejections_total
  # Prometheus counter, labelled by the limit kind that tripped.
  graphql_max_complexity: 300
  graphql_max_depth: 15
  graphql_max_aliases: 30
  graphql_max_body_bytes: 1048576
